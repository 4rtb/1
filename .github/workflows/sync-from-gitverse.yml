name: Sync from GitVerse repository

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      SOURCE_REPO_URL: ${{ secrets.WHITEPRIME_XRCHK }}

    steps:
      - name: Checkout current GitHub repository
        uses: actions/checkout@v4

      - name: Validate source repository URL
        id: source
        shell: bash
        run: |
          set -euo pipefail

          source_url="${SOURCE_REPO_URL:-}"

          if [ -z "$source_url" ]; then
            echo "SOURCE_REPO_URL is empty"
            exit 1
          fi

          source_url="${source_url%/}"

          if ! [[ "$source_url" =~ ^https?:// ]]; then
            echo "SOURCE_REPO_URL must start with http:// or https://"
            exit 1
          fi

          if [[ "$source_url" != *.git ]]; then
            source_url="${source_url}.git"
          fi

          echo "url=$source_url" >> "$GITHUB_OUTPUT"

      - name: Clone source repository
        shell: bash
        env:
          REPO_URL: ${{ steps.source.outputs.url }}
        run: |
          set -euo pipefail
          rm -rf _source
          git clone --depth 1 "$REPO_URL" _source

      - name: Sync files safely
        shell: bash
        run: |
          set -euo pipefail

          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github/workflows/' \
            --exclude='_source' \
            _source/ ./

      - name: Commit and push changes
        shell: bash
        run: |
          set -euo pipefail

          git add -A

          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(sync): update from GitVerse source repository"
          git push

      - name: Cleanup temporary source repo
        if: always()
        shell: bash
        run: |
          rm -rf _source
